<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>数学・トレーナー</title>
  <style>:root {
  color-scheme: light;
  --teal: #07847e;
  --teal-dark: #05726e;
  --aqua: #66d9ca;
  --bg: #eefdfb;
  --card: #ffffff;
  --ink: #101c2a;
  --muted: #5f6f7b;
  --line: #cfecea;
  --wrong: #fdeaea;
  --shadow: 0 7px 18px rgba(5, 114, 110, 0.22);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  letter-spacing: 0;
}

button {
  border: 0;
  font: inherit;
  color: inherit;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

.app-shell {
  min-height: 100vh;
  background: var(--bg);
}

.app-frame {
  position: relative;
  width: min(100%, 480px);
  min-height: 100vh;
  margin: 0 auto;
  padding-bottom: 128px;
  overflow: hidden;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: end;
  height: 80px;
  padding: 0 24px 21px;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
  background: var(--teal);
  color: #fff;
}

.app-header h1 {
  margin: 0;
  text-align: center;
  font-size: 21px;
  font-weight: 800;
}

.hamburger {
  display: grid;
  gap: 6px;
  width: 34px;
  padding: 0;
  background: transparent;
}

.hamburger span {
  display: block;
  height: 3px;
  border-radius: 999px;
  background: #fff;
}

.screen-content {
  padding: 24px 16px 18px;
}

.category-list {
  display: grid;
  gap: 18px;
}

.category-card {
  display: grid;
  grid-template-columns: 82px 1fr 34px;
  align-items: center;
  width: 100%;
  min-height: 74px;
  border-radius: 14px;
  background: var(--card);
  box-shadow: var(--shadow);
  padding: 14px 22px;
  text-align: left;
}

.category-card.featured {
  background: #bfe9e5;
}

.category-icon {
  color: #06111d;
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

.category-title {
  display: grid;
  gap: 4px;
}

.category-title b {
  font-size: 22px;
  font-weight: 500;
}

.category-title small {
  color: var(--muted);
  font-size: 13px;
}

.check {
  display: grid;
  width: 26px;
  height: 26px;
  place-items: center;
  border: 2px solid var(--ink);
  border-radius: 4px;
  color: transparent;
  font-weight: 900;
}

.check.done {
  color: var(--ink);
}

.page-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.page-title-row h2 {
  margin: 0;
  font-size: 24px;
  font-weight: 500;
}

.back-button {
  background: transparent;
  color: var(--teal);
  font-size: 54px;
  line-height: 0.7;
}

.minor-section {
  display: grid;
  gap: 14px;
  margin-bottom: 22px;
}

.minor-section h3 {
  margin: 0;
  color: var(--muted);
  font-size: 15px;
}

.formula-card {
  position: relative;
  display: grid;
  gap: 14px;
  width: 100%;
  max-width: 100%;
  min-height: 144px;
  border-radius: 12px;
  background: var(--card);
  box-shadow: var(--shadow);
  padding: 24px 44px 22px;
  text-align: center;
  overflow: hidden;
}

.formula-name {
  font-size: 20px;
}

.formula-card strong {
  display: block;
  width: 100%;
  max-width: 100%;
  font-size: clamp(17px, 5vw, 25px);
  line-height: 1.5;
}

.formula-card .check {
  position: absolute;
  right: 20px;
  bottom: 20px;
}

.practice-view {
  display: grid;
  gap: 16px;
}

.practice-top-row {
  display: flex;
  justify-content: flex-start;
}

.practice-back-button {
  min-height: 36px;
  border-radius: 999px;
  background: transparent;
  color: var(--teal);
  font-size: 17px;
  font-weight: 800;
}

.progress-label {
  font-size: 22px;
}

.progress-track {
  height: 10px;
  border-radius: 999px;
  background: #fff;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.progress-track span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--aqua);
}

.hint-fill-button {
  justify-self: end;
  min-height: 38px;
  border: 2px solid #55c5bf;
  border-radius: 999px;
  background: #ffffff;
  color: var(--teal);
  padding: 0 16px;
  font-size: 15px;
  font-weight: 800;
  box-shadow: var(--shadow);
}

.question-card,
.answer-reveal-card {
  position: relative;
  width: 100%;
  max-width: 100%;
  min-height: 410px;
  border-radius: 14px;
  background: var(--card);
  box-shadow: var(--shadow);
  padding: 38px 14px 28px;
  overflow: hidden;
}

.question-card.wrong {
  background: var(--wrong);
}

.question-card h2,
.answer-reveal-card h2 {
  text-align: center;
  font-size: 22px;
  font-weight: 500;
}

.choice-bank {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin: 34px 0 46px;
}

.token {
  min-width: 0;
  min-height: 44px;
  border-radius: 8px;
  box-shadow: 4px 7px 9px rgba(10, 72, 72, 0.2);
  font-size: clamp(17px, 5vw, 22px);
  font-weight: 800;
  touch-action: none;
  user-select: none;
}

.token.dragging {
  outline: 3px solid var(--teal);
  transform: translateY(-3px);
}

.token.mint {
  background: #f3ffd7;
}

.token.peach {
  background: #f8dfc5;
}

.token.green {
  background: #dff7dc;
}

.token.blue {
  background: #deedf8;
}

.token.lime {
  background: #f2ffd7;
}

.token.violet {
  background: #f1daf9;
}

.token.cream {
  background: #fbf6e5;
}

.formula-fill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  max-width: 100%;
  min-height: 72px;
  flex-wrap: wrap;
  font-size: clamp(20px, 6vw, 28px);
  font-weight: 800;
  overflow: hidden;
}

.drop-box {
  display: grid;
  min-width: 38px;
  max-width: 82px;
  height: 44px;
  place-items: center;
  border: 3px solid #55c5bf;
  border-radius: 8px;
  background: #eefdfb;
  padding: 0 6px;
  overflow: hidden;
  font-size: clamp(16px, 5vw, 22px);
}

.drop-box.filled {
  background: #e1f9d9;
}

.blank-cluster {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  max-width: 100%;
}

.formula-static {
  min-width: 0;
  max-width: 100%;
}

.latex-fragment {
  display: inline-block;
  max-width: 100%;
  overflow-wrap: anywhere;
  font-family: "Times New Roman", Times, serif;
  font-size: 0.78em;
  line-height: 1.25;
  white-space: normal;
}

.dot-row {
  display: flex;
  justify-content: flex-end;
  gap: 9px;
}

.dot-row i {
  display: block;
  width: 18px;
  height: 18px;
  border: 4px solid #55c5bf;
  border-radius: 50%;
}

.dot-row i {
  width: 14px;
  height: 14px;
  border-width: 3px;
}

.dot-row i.active {
  background: #55c5bf;
}

.retry-icon {
  position: absolute;
  top: 16px;
  right: 18px;
  background: transparent;
  color: #55c5bf;
  font-size: 32px;
}

.practice-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
}

.next-row {
  display: flex;
  justify-content: flex-end;
}

.large-button {
  min-height: 58px;
  border-radius: 16px;
  background: var(--teal);
  color: #fff;
  font-size: 20px;
  font-weight: 800;
}

.next-row .large-button {
  width: 46%;
}

.answer-reveal-card {
  display: grid;
  align-content: center;
  gap: 16px;
  min-height: 330px;
  margin-top: 80px;
  text-align: center;
}

.submitted-answer {
  display: grid;
  gap: 10px;
  border-radius: 10px;
  background: #eefdfb;
  padding: 12px;
}

.submitted-answer span,
.answer-label {
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
}

.submitted-token-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
}

.submitted-token-row b {
  display: grid;
  min-width: 28px;
  min-height: 30px;
  place-items: center;
  border-radius: 6px;
  background: #e1f9d9;
  padding: 4px 7px;
  font-size: 16px;
}

.answer-reveal-card strong {
  display: block;
  width: 100%;
  max-width: 100%;
  font-size: clamp(20px, 6vw, 30px);
  line-height: 1.7;
}

.stats-view {
  display: grid;
  gap: 18px;
}

.stats-summary,
.major-stats-card,
.formula-progress-list {
  border-radius: 14px;
  background: var(--card);
  box-shadow: var(--shadow);
}

.stats-summary {
  display: grid;
  gap: 18px;
  padding: 28px 26px;
}

.ring {
  display: grid;
  width: 150px;
  height: 150px;
  place-items: center;
  margin: 0 auto 8px;
  border-radius: 50%;
}

.ring::before {
  content: "";
  position: absolute;
}

.ring span {
  display: grid;
  width: 112px;
  height: 112px;
  place-items: center;
  border-radius: 50%;
  background: #fff;
  font-size: 28px;
  font-weight: 900;
}

.stats-line {
  display: flex;
  justify-content: space-between;
  font-size: 19px;
}

.stats-line b {
  color: var(--teal);
}

.major-stats-card {
  padding: 18px 20px;
}

.major-stats-head {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 20px;
}

.major-stats-head strong {
  color: var(--teal);
}

.mini-track {
  height: 22px;
  border-radius: 999px;
  background: #e5f5f4;
  overflow: hidden;
  text-align: center;
}

.mini-track span {
  display: block;
  min-width: 34px;
  height: 100%;
  border-radius: inherit;
  background: #bdeee8;
  font-size: 14px;
  line-height: 22px;
}

.formula-progress-list {
  max-height: 420px;
  overflow: hidden;
  padding: 14px 16px;
}

.formula-progress-list button {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  width: 100%;
  min-height: 58px;
  border-bottom: 2px solid #67ddd1;
  background: transparent;
  text-align: left;
  font-size: 20px;
  overflow: hidden;
}

.formula-progress-list button:last-child {
  border-bottom: 0;
}

.bottom-nav {
  position: fixed;
  right: 50%;
  bottom: 0;
  z-index: 20;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  width: min(100%, 480px);
  height: 76px;
  transform: translateX(50%);
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  background: var(--teal);
  color: #b9e9e4;
}

.bottom-nav button {
  display: grid;
  gap: 4px;
  place-items: center;
  min-height: 72px;
  background: transparent;
  color: inherit;
  font-size: 17px;
  font-weight: 800;
}

.bottom-nav button.active {
  color: #fff;
}

.grid-icon,
.bars-icon {
  font-size: 28px;
  line-height: 1;
}

.math {
  display: inline-block;
  max-width: 100%;
  overflow-wrap: anywhere;
  vertical-align: middle;
}

.math mjx-container {
  max-width: 100% !important;
  overflow: hidden;
}

.math mjx-container svg {
  max-width: 100% !important;
  height: auto;
}

@media (max-width: 390px) {
  .choice-bank {
    gap: 8px;
  }

  .token {
    min-height: 46px;
    font-size: 18px;
  }

  .practice-actions {
    gap: 24px;
  }
}

  let selectedMajor = null;
  let selectedMinor = null;
  let currentFormula = formulas[0];
  let practiceState = "question";
  let question = null;
  let placedChoices = [];
  let draggingChoice = null;

  function groupBy(items, getter) {
    return items.reduce((groups, item) => {
      const key = getter(item);
      groups[key] = groups[key] || [];
      groups[key].push(item);
      return groups;
    }, {});
  }

  function loadStats() {
    try {
      const raw = sessionStorage.getItem(statsKey);
      if (!raw) return { attempts: 0, correct: 0, rememberedIds: [], history: [] };
      const parsed = JSON.parse(raw);
      return {
        attempts: parsed.attempts || 0,
        correct: parsed.correct || 0,
        rememberedIds: Array.isArray(parsed.rememberedIds) ? parsed.rememberedIds : [],
        history: Array.isArray(parsed.history) ? parsed.history : []
      };
    } catch {
      return { attempts: 0, correct: 0, rememberedIds: [], history: [] };
    }
  }

  function saveStats(stats) {
    sessionStorage.setItem(statsKey, JSON.stringify(stats));
  }

  function mathText(latex) {
    return "\\(" + latex + "\\)";
  }

  function typeset() {
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
  }

  function findMainEqualsIndex(latex) {
    let braceDepth = 0;
    let parenDepth = 0;
    for (let index = 0; index < latex.length; index += 1) {
      const char = latex[index];
      if (char === "{") braceDepth += 1;
      if (char === "}") braceDepth = Math.max(0, braceDepth - 1);
      if (char === "(") parenDepth += 1;
      if (char === ")") parenDepth = Math.max(0, parenDepth - 1);
      if (char === "=" && braceDepth === 0 && parenDepth === 0) return index;
    }
    return -1;
  }

  function readBraceContent(source, openIndex) {
    let depth = 0;
    for (let index = openIndex; index < source.length; index += 1) {
      const char = source[index];
      if (char === "{") depth += 1;
      if (char === "}") depth -= 1;
      if (depth === 0) return { content: source.slice(openIndex + 1, index), end: index + 1 };
    }
    return { content: source.slice(openIndex + 1), end: source.length };
  }

  function mergeScriptTokens(tokens) {
    const merged = [];
    for (let index = 0; index < tokens.length; index += 1) {
      const token = tokens[index];
      if ((token === "_" || token === "^") && merged.length > 0 && tokens[index + 1]) {
        const base = merged.pop();
        merged.push(base + token + tokens[index + 1]);
        index += 1;
      } else {
        merged.push(token);
      }
    }
    return merged;
  }

  function latexToAnswerTokens(latex) {
    const commandMap = { cap: "∩", cup: "∪", le: "≤", ge: "≥", to: "→", pm: "±", sum: "Σ", int: "∫", cdots: "…", lambda: "λ", mu: "μ", sigma: "σ", theta: "θ", pi: "π", rho: "ρ", alpha: "α", beta: "β", partial: "∂" };
    const tokens = [];
    for (let index = 0; index < latex.length; index += 1) {
      const char = latex[index];
      if (/\s/.test(char) || char === "}") continue;
      if (char === "{") {
        const content = readBraceContent(latex, index);
        tokens.push(content.content);
        index = content.end - 1;
        continue;
      }
      if (char === "\\") {
        const match = latex.slice(index + 1).match(/^[A-Za-z]+/);
        const command = match?.[0] || "";
        if (command === "frac") {
          let cursor = index + 1 + command.length;
          if (latex[cursor] === "{") {
            const numerator = readBraceContent(latex, cursor);
            cursor = numerator.end;
            if (latex[cursor] === "{") {
              const denominator = readBraceContent(latex, cursor);
              tokens.push(...latexToAnswerTokens(numerator.content), "/", ...latexToAnswerTokens(denominator.content));
              index = denominator.end - 1;
              continue;
            }
          }
        }
        if (command === "sqrt" || command === "bar" || command === "overline") {
          const cursor = index + 1 + command.length;
          if (latex[cursor] === "{") {
            const content = readBraceContent(latex, cursor);
            if (command === "sqrt") tokens.push("√", "(");
            tokens.push(...latexToAnswerTokens(content.content));
            if (command === "sqrt") tokens.push(")");
            index = content.end - 1;
            continue;
          }
        }
        tokens.push(commandMap[command] || command || char);
        index += command.length;
        continue;
      }
      tokens.push(char);
    }
    return mergeScriptTokens(tokens.filter(Boolean));
  }

  function makeQuestion(formula) {
    const equalIndex = findMainEqualsIndex(formula.latex);
    const leftPrefix = equalIndex >= 0 ? formula.latex.slice(0, equalIndex + 1) : "";
    const rhs = equalIndex >= 0 ? formula.latex.slice(equalIndex + 1) : formula.latex;
    const targets = latexToAnswerTokens(rhs);
    const distractors = formulas.flatMap((item) => latexToAnswerTokens(item.latex))
      .filter((token) => !targets.includes(token) && token.length <= 8)
      .filter((token, index, array) => array.indexOf(token) === index)
      .slice(0, 10);
    const choices = [...targets, ...distractors].filter((choice, index, array) => array.indexOf(choice) === index).slice(0, 18);
    const shuffled = choices.map((choice, index) => ({ choice, sort: (choice.charCodeAt(0) * 17 + index * 31) % 97 }))
      .sort((a, b) => a.sort - b.sort).map((item) => item.choice);
    return { targets, choices: shuffled, leftPrefix };
  }

  function setActiveNav() {
    navIndex.classList.toggle("active", view === "index" || view === "list");
    navStats.classList.toggle("active", view === "stats");
  }

  function render() {
    setActiveNav();
    if (view === "index") renderIndex();
    if (view === "list") renderList();
    if (view === "practice") renderPractice();
    if (view === "stats") renderStats();
    typeset();
  }

  function rememberedSet() {
    return new Set(loadStats().rememberedIds);
  }

  function renderIndex() {
    const majorGroups = groupBy(formulas, (formula) => formula.majorCategory);
    const rows = Object.entries(majorGroups).flatMap(([major, majorFormulas]) =>
      Object.entries(groupBy(majorFormulas, (formula) => formula.minorCategory)).map(([minor, rowFormulas]) => ({ major, minor, formulas: rowFormulas }))
    );
    const remembered = rememberedSet();
    app.innerHTML = '<div class="category-list">' + rows.map((row, index) => {
      const done = row.formulas.filter((formula) => remembered.has(formula.id)).length === row.formulas.length;
      return '<button type="button" class="' + (index === 0 ? 'category-card featured' : 'category-card') + '" data-major="' + row.major + '" data-minor="' + row.minor + '">' +
        '<span class="category-icon">' + (categoryIcons[row.major] || 'f(x)') + '</span>' +
        '<span class="category-title"><b>' + row.major + '</b><small>' + row.minor + '</small></span>' +
        '<span class="' + (done ? 'check done' : 'check') + '">✓</span></button>';
    }).join("") + "</div>";
    app.querySelectorAll(".category-card").forEach((button) => {
      button.addEventListener("click", () => {
        selectedMajor = button.dataset.major;
        selectedMinor = button.dataset.minor;
        view = "list";
        render();
      });
    });
  }

  function renderList() {
    const visible = formulas.filter((formula) => (!selectedMajor || formula.majorCategory === selectedMajor) && (!selectedMinor || formula.minorCategory === selectedMinor));
    const groups = groupBy(visible, (formula) => formula.minorCategory);
    const remembered = rememberedSet();
    app.innerHTML = '<div class="list-view"><div class="page-title-row"><h2>' + (selectedMinor || selectedMajor || "公式一覧") + '</h2><button type="button" class="back-button" id="back-index">‹</button></div>' +
      Object.entries(groups).map(([minor, items]) => '<section class="minor-section"><h3>' + minor + '</h3>' + items.map((formula) =>
        '<button type="button" class="formula-card" data-id="' + formula.id + '"><span class="formula-name">' + formula.name + '</span><strong class="math">' + mathText(formula.latex) + '</strong><span class="' + (remembered.has(formula.id) ? 'check done' : 'check') + '">✓</span></button>'
      ).join("") + '</section>').join("") + '</div>';
    document.getElementById("back-index").addEventListener("click", () => { view = "index"; render(); });
    app.querySelectorAll(".formula-card").forEach((button) => {
      button.addEventListener("click", () => startPractice(formulas.find((formula) => formula.id === button.dataset.id)));
    });
  }

  function startPractice(formula) {
    currentFormula = formula || currentFormula || formulas[0];
    question = makeQuestion(currentFormula);
    placedChoices = [];
    practiceState = "question";
    view = "practice";
    render();
  }

  function placeChoice(choice) {
    const next = Array.from({ length: question.targets.length }, (_, index) => placedChoices[index] || "");
    const emptyIndex = next.findIndex((value) => !value);
    if (emptyIndex >= 0) next[emptyIndex] = choice;
    else next.push(choice);
    placedChoices = next.slice(0, question.targets.length);
    render();
  }

  function revealHint() {
    const next = Array.from({ length: question.targets.length }, (_, index) => placedChoices[index] || "");
    const blanks = next.map((value, index) => value ? -1 : index).filter((index) => index >= 0);
    blanks.slice(0, Math.max(1, Math.ceil(question.targets.length * 0.3))).forEach((index) => { next[index] = question.targets[index]; });
    placedChoices = next;
    render();
  }

  function submitAnswer() {
    const correct = question.targets.length === placedChoices.length && question.targets.every((target, index) => placedChoices[index] === target);
    const stats = loadStats();
    const rememberedIds = correct ? Array.from(new Set([...stats.rememberedIds, currentFormula.id])) : stats.rememberedIds;
    saveStats({ attempts: stats.attempts + 1, correct: stats.correct + (correct ? 1 : 0), rememberedIds, history: [{ id: currentFormula.id, correct, answeredAt: new Date().toISOString() }, ...stats.history].slice(0, 50) });
    practiceState = correct ? "answer" : "error";
    render();
  }

  function nextFormula() {
    const index = formulas.findIndex((formula) => formula.id === currentFormula.id);
    startPractice(formulas[(index + 1) % formulas.length]);
  }

  function renderPractice() {
    if (!question) question = makeQuestion(currentFormula);
    const stats = loadStats();
    const complete = stats.rememberedIds.length;
    const progress = formulas.length ? (complete / formulas.length) * 100 : 0;
    if (practiceState === "answer") {
      app.innerHTML = '<div class="practice-view"><div class="practice-top-row"><button type="button" class="practice-back-button" id="back-list">‹ 公式一覧</button></div><div class="progress-label">完了: ' + complete + '/' + formulas.length + '</div><div class="progress-track"><span style="width:' + progress + '%"></span></div><section class="answer-reveal-card"><h2>' + currentFormula.name + '</h2><div class="submitted-answer"><span>あなたの解答</span><div class="submitted-token-row">' + placedChoices.map((choice, index) => '<b class="math" key="' + index + '">' + mathText(choice) + '</b>').join("") + '</div></div><span class="answer-label">正しい公式</span><strong class="math">' + mathText(currentFormula.latex) + '</strong></section><div class="next-row"><button type="button" class="large-button" id="next-formula">次へ</button></div></div>';
      document.getElementById("back-list").addEventListener("click", backToList);
      document.getElementById("next-formula").addEventListener("click", nextFormula);
      return;
    }
    app.innerHTML = '<div class="practice-view"><div class="practice-top-row"><button type="button" class="practice-back-button" id="back-list">‹ 公式一覧</button></div><div class="progress-label">完了: ' + complete + '/' + formulas.length + '</div><div class="progress-track"><span style="width:' + progress + '%"></span></div>' +
      (practiceState === "question" ? '<button type="button" class="hint-fill-button" id="hint-button">ヒント: 30%表示</button>' : '') +
      '<section class="' + (practiceState === "error" ? 'question-card wrong' : 'question-card') + '">' +
      (practiceState === "error" ? '<button type="button" class="retry-icon" id="clear-answer">↻</button>' : '') +
      '<h2>' + currentFormula.name + '</h2><div class="choice-bank">' + question.choices.map((choice, index) => '<button type="button" class="token ' + pastelClasses[index % pastelClasses.length] + '" data-choice="' + choice + '"><span class="math">' + mathText(choice) + '</span></button>').join("") + '</div>' +
      '<div class="formula-fill"><span class="math formula-static">' + mathText(question.leftPrefix) + '</span>' + question.targets.map((target, index) => '<button type="button" class="' + (placedChoices[index] ? 'drop-box filled' : 'drop-box') + '" data-clear="' + index + '">' + (placedChoices[index] ? '<span class="math">' + mathText(placedChoices[index]) + '</span>' : '') + '</button>').join("") + '</div></section>' +
      (practiceState === "question" ? '<div class="practice-actions"><button type="button" class="large-button" id="skip-button">スキップ</button><button type="button" class="large-button" id="submit-button">答える</button></div>' : '<div class="next-row"><button type="button" class="large-button" id="next-formula">次へ</button></div>') + '</div>';
    document.getElementById("back-list").addEventListener("click", backToList);
    document.querySelectorAll(".token").forEach((button) => button.addEventListener("click", () => placeChoice(button.dataset.choice)));
    document.querySelectorAll(".drop-box").forEach((button) => button.addEventListener("click", () => { placedChoices[Number(button.dataset.clear)] = ""; render(); }));
    document.getElementById("hint-button")?.addEventListener("click", revealHint);
    document.getElementById("clear-answer")?.addEventListener("click", () => { placedChoices = []; practiceState = "question"; render(); });
    document.getElementById("skip-button")?.addEventListener("click", nextFormula);
    document.getElementById("submit-button")?.addEventListener("click", submitAnswer);
    document.getElementById("next-formula")?.addEventListener("click", nextFormula);
  }

  function backToList() {
    selectedMajor = currentFormula.majorCategory;
    selectedMinor = currentFormula.minorCategory;
    view = "list";
    render();
  }

  function renderStats() {
    const stats = loadStats();
    const remembered = new Set(stats.rememberedIds);
    const completeRate = formulas.length ? Math.round((remembered.size / formulas.length) * 100) : 0;
    const correctRate = stats.attempts ? Math.round((stats.correct / stats.attempts) * 100) : 0;
    const byMajor = groupBy(formulas, (formula) => formula.majorCategory);
    app.innerHTML = '<div class="stats-view"><section class="stats-summary"><div class="ring" style="background:conic-gradient(#0a817a ' + (completeRate * 3.6) + 'deg, #e8f7f5 0deg)"><span>' + completeRate + '%</span></div><div class="stats-line"><span>暗記した数式</span><b>' + remembered.size + '/' + formulas.length + '</b></div><div class="stats-line"><span>回答総数</span><b>' + stats.attempts + '</b></div><div class="stats-line"><span>正解総数</span><b>' + stats.correct + '</b></div><div class="stats-line"><span>正解率</span><b>' + correctRate + '%</b></div></section>' +
      Object.entries(byMajor).map(([major, items]) => { const done = items.filter((formula) => remembered.has(formula.id)).length; const percent = items.length ? Math.round((done / items.length) * 100) : 0; return '<section class="major-stats-card"><div class="major-stats-head"><span class="category-icon">' + (categoryIcons[major] || 'f(x)') + '</span><b>' + major + '</b><strong>' + done + '/' + items.length + '</strong></div><div class="mini-track"><span style="width:' + percent + '%">' + percent + '%</span></div></section>'; }).join("") +
      '<section class="formula-progress-list">' + formulas.slice(0, 12).map((formula) => '<button type="button" data-id="' + formula.id + '"><span class="math">' + mathText(formula.latex) + '</span><span class="dot-row"><i class="' + (remembered.has(formula.id) ? 'active' : '') + '"></i><i></i><i></i></span></button>').join("") + '</section></div>';
    app.querySelectorAll(".formula-progress-list button").forEach((button) => button.addEventListener("click", () => startPractice(formulas.find((formula) => formula.id === button.dataset.id))));
  }

  navIndex.addEventListener("click", () => { view = "index"; render(); });
  navStats.addEventListener("click", () => { view = "stats"; render(); });
  render();
})();
  </script>
</body>
</html>
